services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: assetuser
      POSTGRES_PASSWORD: assetpass
      POSTGRES_DB: assetdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetuser -d assetdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://assetuser:assetpass@db/assetdb
      API_KEY: dev-secret-key
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data: